<!DOCTYPE html>
<html>
<head>
<title>SCADA ENERGY SYSTEM</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
/* ===== CSS KAMU (TIDAK DIUBAH) ===== */
body{
    margin:0;
    font-family:"Orbitron","Segoe UI",sans-serif;
    background:#020617;
    color:#e2e8f0;
}
.header{
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    border-bottom:1px solid #1e293b;
}
.sidebar{
    width:220px;
    height:100vh;
    position:fixed;
    top:60px;
    background:#020617;
    border-right:1px solid #1e293b;
}
.sidebar button{
    width:100%;
    padding:15px;
    border:none;
    background:none;
    color:#94a3b8;
    text-align:left;
    cursor:pointer;
}
.sidebar button:hover{
    background:#1e293b;
    color:white;
}
.content{
    margin-left:220px;
    margin-top:60px;
    padding:20px;
}
.page{display:none;}
.active{display:block;}
.card{
    background:#020617;
    border:1px solid #1e293b;
    border-radius:10px;
    padding:20px;
    margin:10px;
    width:180px;
    display:inline-block;
    text-align:center;
}
.card p{
    font-size:22px;
    font-weight:bold;
}
.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}
.tab{
    padding:12px 22px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:#94a3b8;
    cursor:pointer;
    font-weight:bold;
}
.tab.active{
    color:white;
}
.tab:nth-child(1).active{background:#22c55e;}
.tab:nth-child(2).active{background:#ef4444;}
.flow{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
    margin:20px 0;
}
.node{
    padding:15px 25px;
    border-radius:10px;
    background:#1e293b;
    font-weight:bold;
}
.line{
    width:120px;
    height:6px;
    background:#334155;
    position:relative;
    overflow:hidden;
    border-radius:5px;
}
.line.active::after{
    content:"";
    position:absolute;
    width:60px;
    height:100%;
    background:linear-gradient(90deg,transparent,#00f0ff,transparent);
    animation:flow 0.7s linear infinite;
}
@keyframes flow{
    from{left:-60px;}
    to{left:100%;}
}
.active-node{
    background:#00ff88;
    box-shadow:0 0 15px #00ff88;
}
.control button{
    padding:15px 30px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}
.batt{background:#022c22;color:#22c55e;}
.pln{background:#2c0202;color:#ef4444;}
.auto{background:#021a2c;color:#3b82f6;}
.status-box{
    margin-top:20px;
    padding:15px;
    border:1px solid #1e293b;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
⚡ SCADA ENERGY SYSTEM
<div>INDUSTRIAL MODE</div>
</div>

<div class="sidebar">
    <button onclick="showPage('monitor')">📊 Monitoring</button>
    <button onclick="showPage('manual')">🎮 Manual</button>
</div>

<div class="content">

<!-- MONITOR -->
<div id="monitor" class="page active">

<h2 id="modeText">SYSTEM READY</h2>

<div class="flow">
    <div class="node" id="plnNode">PLN</div>
    <div class="line" id="line1"></div>
    <div class="node">LOAD</div>
    <div class="line" id="line2"></div>
    <div class="node" id="battNode">BATERAI</div>
</div>

<div class="tabs">
    <button class="tab active" onclick="setTab(this,'batt')">BATERAI</button>
    <button class="tab" onclick="setTab(this,'pln')">PLN</button>
</div>

<div id="batt" class="monitorTab">
<div class="card"><h3>Tegangan</h3><p id="bat_v">0 V</p></div>
<div class="card"><h3>Arus</h3><p id="bat_i">0 A</p></div>
<div class="card"><h3>Daya</h3><p id="bat_p">0 W</p></div>
</div>

<div id="pln" class="monitorTab" style="display:none;">
<div class="card"><h3>Tegangan</h3><p id="pln_v">0 V</p></div>
<div class="card"><h3>Arus</h3><p id="pln_i">0 A</p></div>
<div class="card"><h3>Daya</h3><p id="pln_p">0 W</p></div>
</div>

<h3>PLN Voltage (200–230V)</h3>
<canvas id="chartPLN"></canvas>

<h3>Battery Voltage (10–14V)</h3>
<canvas id="chartBAT"></canvas>

</div>

<!-- MANUAL -->
<div id="manual" class="page">
<h2>Manual Control Assistant</h2>

<div class="control">
<button class="batt" onclick="sendCmd('INV')">BATERAI</button>
<button class="pln" onclick="sendCmd('PLN')">PLN</button>
<button class="auto" onclick="sendCmd('AUTO')">AUTO</button>
</div>

<div class="status-box">
<h3 id="status">Status: -</h3>
</div>
</div>

</div>

<script>

// NAV
function showPage(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
}

// TAB
function setTab(btn,tab){
document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
document.querySelectorAll(".monitorTab").forEach(el=>el.style.display="none");
document.getElementById(tab).style.display="block";
}

// ===== MQTT CONNECT =====
const client = mqtt.connect("wss://le27e62e.ala.asia-southeast1.emqxsl.com:8084/mqtt", {
  username: "esp32",
  password: "123456"
});

client.on("connect", ()=>{
  console.log("MQTT CONNECTED 🔥");
  client.subscribe("test/monitor");
});

// ===== CHART =====
let labels=[], dataPLN=[], dataBAT=[];

const chartPLN=new Chart(document.getElementById("chartPLN"),{
type:"line",
data:{labels:labels,datasets:[{data:dataPLN,borderColor:"#ef4444"}]},
options:{animation:false,scales:{y:{min:200,max:230}}}
});

const chartBAT=new Chart(document.getElementById("chartBAT"),{
type:"line",
data:{labels:labels,datasets:[{data:dataBAT,borderColor:"#22c55e"}]},
options:{animation:false,scales:{y:{min:10,max:14}}}
});

// ===== TERIMA DATA =====
client.on("message",(topic,message)=>{

let d=JSON.parse(message.toString());

document.getElementById("bat_v").innerText=d.bat_v.toFixed(2)+" V";
document.getElementById("bat_i").innerText=d.bat_i.toFixed(2)+" A";
document.getElementById("bat_p").innerText=d.bat_p.toFixed(2)+" W";

document.getElementById("pln_v").innerText=d.pln_v.toFixed(2)+" V";
document.getElementById("pln_i").innerText=d.pln_i.toFixed(2)+" A";
document.getElementById("pln_p").innerText=d.pln_p.toFixed(2)+" W";

if(d.pln_v>200){
document.getElementById("modeText").innerText="⚡ PLN ACTIVE";
}else{
document.getElementById("modeText").innerText="🔋 BATTERY ACTIVE";
}

// FLOW
let pln=document.getElementById("plnNode");
let batt=document.getElementById("battNode");
let l1=document.getElementById("line1");
let l2=document.getElementById("line2");

pln.classList.remove("active-node");
batt.classList.remove("active-node");
l1.classList.remove("active");
l2.classList.remove("active");

if(d.pln_v>200){
pln.classList.add("active-node");
l1.classList.add("active");
}else{
batt.classList.add("active-node");
l2.classList.add("active");
}

// CHART
let time=new Date().toLocaleTimeString();
labels.push(time);
dataPLN.push(d.pln_v);
dataBAT.push(d.bat_v);

if(labels.length>20){
labels.shift();dataPLN.shift();dataBAT.shift();
}

chartPLN.update();
chartBAT.update();

});

// CONTROL MQTT
function sendCmd(cmd){
client.publish("test/control",cmd);
document.getElementById("status").innerText="Status: "+cmd+" ACTIVE";
}

</script>

</body>
</html>
