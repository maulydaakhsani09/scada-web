<!DOCTYPE html>
<html>
<head>
<title>SCADA ENERGY SYSTEM</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:"Orbitron","Segoe UI",sans-serif;
    background:#020617;
    color:#e2e8f0;
}

.header{
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    border-bottom:1px solid #1e293b;
}

.sidebar{
    width:220px;
    height:100vh;
    position:fixed;
    top:60px;
    background:#020617;
    border-right:1px solid #1e293b;
}

.sidebar button{
    width:100%;
    padding:15px;
    border:none;
    background:none;
    color:#94a3b8;
    text-align:left;
    cursor:pointer;
}

.sidebar button:hover{
    background:#1e293b;
    color:white;
}

.content{
    margin-left:220px;
    margin-top:60px;
    padding:20px;
}

.page{display:none;}
.active{display:block;}

.card{
    background:#020617;
    border:1px solid #1e293b;
    border-radius:10px;
    padding:20px;
    margin:10px;
    width:180px;
    display:inline-block;
    text-align:center;
}

.card p{
    font-size:22px;
    font-weight:bold;
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tab{
    padding:12px 22px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:#94a3b8;
    cursor:pointer;
    font-weight:bold;
}

.tab.active{
    color:white;
}

.tab:nth-child(1).active{background:#22c55e;}
.tab:nth-child(2).active{background:#ef4444;}

.flow{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
    margin:20px 0;
}

.node{
    padding:15px 25px;
    border-radius:10px;
    background:#1e293b;
    font-weight:bold;
}

.line{
    width:120px;
    height:6px;
    background:#334155;
    position:relative;
    overflow:hidden;
    border-radius:5px;
}

.line.active::after{
    content:"";
    position:absolute;
    width:60px;
    height:100%;
    background:linear-gradient(90deg,transparent,#00f0ff,transparent);
    animation:flow 0.7s linear infinite;
}

@keyframes flow{
    from{left:-60px;}
    to{left:100%;}
}

.active-node{
    background:#00ff88;
    box-shadow:0 0 15px #00ff88;
}

.control button{
    padding:15px 30px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.batt{background:#022c22;color:#22c55e;}
.pln{background:#2c0202;color:#ef4444;}
.auto{background:#021a2c;color:#3b82f6;}

.status-box{
    margin-top:20px;
    padding:15px;
    border:1px solid #1e293b;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
⚡ SCADA ENERGY SYSTEM
<div>INDUSTRIAL MODE</div>
</div>

<div class="sidebar">
    <button onclick="showPage('monitor')">📊 Monitoring</button>
    <button onclick="showPage('manual')">🎮 Manual</button>
</div>

<div class="content">

<div id="monitor" class="page active">

<h2 id="modeText">SYSTEM READY</h2>

<div class="flow">
    <div class="node" id="plnNode">PLN</div>
    <div class="line" id="line1"></div>
    <div class="node">LOAD</div>
    <div class="line" id="line2"></div>
    <div class="node" id="battNode">BATERAI</div>
</div>

<div class="tabs">
    <button class="tab active" onclick="setTab(this,'batt')">BATERAI</button>
    <button class="tab" onclick="setTab(this,'pln')">PLN</button>
</div>

<!-- BATERAI -->
<div id="batt" class="monitorTab">
<div class="card"><h3>Tegangan</h3><p id="bat_v">0 V</p></div>
<div class="card"><h3>Arus</h3><p id="bat_i">0 A</p></div>
<div class="card"><h3>Daya</h3><p id="bat_p">0 W</p></div>

<div class="card"><h3>Frekuensi</h3><p id="bat_f">0 Hz</p></div>
<div class="card"><h3>PF</h3><p id="bat_pf">0</p></div>
<div class="card"><h3>Energi</h3><p id="bat_e">0 Wh</p></div>
</div>

<!-- PLN -->
<div id="pln" class="monitorTab" style="display:none;">
<div class="card"><h3>Tegangan</h3><p id="pln_v">0 V</p></div>
<div class="card"><h3>Arus</h3><p id="pln_i">0 A</p></div>
<div class="card"><h3>Daya</h3><p id="pln_p">0 W</p></div>

<div class="card"><h3>Frekuensi</h3><p id="pln_f">0 Hz</p></div>
<div class="card"><h3>PF</h3><p id="pln_pf">0</p></div>
<div class="card"><h3>Energi</h3><p id="pln_e">0 Wh</p></div>
</div>

</div>

<script>

function f(x){return parseFloat(x).toFixed(2);}

async function loop(){
while(true){
try{
let res=await fetch("monitor.php");
let d=await res.json();

// BASIC
bat_v.innerText=f(d.bat_v)+" V";
bat_i.innerText=f(d.bat_i)+" A";
bat_p.innerText=f(d.bat_p)+" W";

pln_v.innerText=f(d.pln_v)+" V";
pln_i.innerText=f(d.pln_i)+" A";
pln_p.innerText=f(d.pln_p)+" W";

// TAMBAHAN
bat_f.innerText=f(d.bat_f)+" Hz";
bat_pf.innerText=f(d.bat_pf);
bat_e.innerText=f(d.bat_e)+" Wh";

pln_f.innerText=f(d.pln_f)+" Hz";
pln_pf.innerText=f(d.pln_pf);
pln_e.innerText=f(d.pln_e)+" Wh";

}catch(e){console.log(e);}
await new Promise(r=>setTimeout(r,2000));
}
}

loop();

</script>

</body>
</html>
